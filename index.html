<!DOCTYPE html>
<html>
<head>
    <title>Strava Redirect</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #ffcccc 0%, #ffffff 100%);
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            margin: 10px 0;
        }
        a {
            display: inline-block;
            background: #ff6b35;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            text-decoration: none;
        }
        a:hover {
            background: #ff5722;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Connecting to Running for Time...</h1>
        <p id="status">Tap the button below to return to the app</p>
        <div id="linkContainer"></div>
    </div>
    
    <script>
        // Get the code and state from URL parameters
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const state = params.get('state');
        const scope = params.get('scope');
        
        if (code) {
            // Build the redirect URL to our iOS app
            let redirectUrl = 'runnningfortime://oauth?code=' + encodeURIComponent(code);
            
            if (state) {
                redirectUrl += '&state=' + encodeURIComponent(state);
            }
            if (scope) {
                redirectUrl += '&scope=' + encodeURIComponent(scope);
            }
            
            // Create a clickable link instead of auto-redirecting
            const linkContainer = document.getElementById('linkContainer');
            const link = document.createElement('a');
            link.href = redirectUrl;
            link.textContent = 'Return to Running for Time';
            linkContainer.appendChild(link);
            
            // Also try auto-redirect after a delay
            setTimeout(() => {
                window.location.href = redirectUrl;
            }, 500);
        } else {
            // If there's an error, show it
            const error = params.get('error');
            const errorDescription = params.get('error_description');
            document.getElementById('status').innerHTML = '<h1>Error</h1><p>' + (error || 'Unknown error') + '</p><p>' + (errorDescription || '') + '</p>';
        }
    </script>
</body>
</html>
